server {
    listen       80;
    server_name  localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # v1.8.3: force revalidation on every load so updates appear without manual cache clear
        # (mobile Edge in particular ignores Ctrl+R / app restart on stale HTML)
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Helper endpoint for IP detection
    location /internal-ip {
        default_type text/plain;
        return 200 "$remote_addr";
    }

    # Proxy to Docker API UNIX socket
    location /docker/ {
        proxy_pass http://unix:/var/run/docker.sock:/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # Config API (persistent settings) — proxied to config-api service
    location /api/config {
        proxy_pass http://config-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # Themes API (v1.9.0) — proxied to config-api service
    location /api/themes {
        proxy_pass http://config-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # Widgets API (per-app data fetches with caching) — proxied to config-api service
    location /api/widgets {
        proxy_pass http://config-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # Calendar feed proxy (v1.7.1) — server-side ICS fetch + parse
    location = /api/calendar {
        proxy_pass http://config-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
    }

    # RSS / Atom feed proxy (v1.7.2) — server-side feed fetch + parse
    location = /api/rss {
        proxy_pass http://config-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
    }

    # Quick Stat proxy (v1.7.3) — fetches arbitrary URL, frontend extracts value
    location = /api/quickstat {
        proxy_pass http://config-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location = /api/health {
        proxy_pass http://config-api:3000/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # p95 stats (local metrics hack)
    location = /api/p95stats {
        proxy_pass http://config-api:3000/api/p95stats;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location = /api/benchmark/start {
        proxy_pass http://config-api:3000/api/benchmark/start;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Content-Length "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # USB Management API (v1.9.2)
    location ~ ^/api/usb/(list|eject|clear-ejected)$ {
        proxy_pass http://config-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # v1.8.4: Watchtower widget endpoints — proxied to config-api which holds the token
    location ~ ^/api/watchtower/(scan|metrics)$ {
        proxy_pass http://config-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 35s;
    }

    # VM & Service Control API (v1.9.4)
    location ~ ^/api/vmservice/ {
        proxy_pass http://config-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
    }


    # Direct endpoint for container list
    location = /api/containers {
        proxy_pass http://unix:/var/run/docker.sock:/containers/json?all=false;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # v1.8.3: includes stopped containers — needed for Start action on tiles whose container is down
    location = /api/containers-all {
        proxy_pass http://unix:/var/run/docker.sock:/containers/json?all=true;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # v1.8.3: container actions — start/stop/restart via Docker socket. Body is empty (Docker accepts).
    location ~ "^/api/container/([a-zA-Z0-9_.\-]+)/(start|stop|restart)$" {
        proxy_pass http://unix:/var/run/docker.sock:/containers/$1/$2;
        proxy_method POST;
        proxy_set_header Content-Length "0";
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Docker info endpoint (for container count)
    location = /api/docker-info {
        proxy_pass http://unix:/var/run/docker.sock:/info;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }
}
